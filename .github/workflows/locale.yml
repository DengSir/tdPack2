name: locale
on:
  push:
    braches:
      - master

jobs:
  locale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: DengSir/curse-locale@v1

      - uses: GuillaumeFalourd/git-commit-push@v1.3
        with:
          commit_message: "chore: Update locale files"
          tags: false

